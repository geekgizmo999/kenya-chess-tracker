name: Update Kenya chess data

on:
  schedule:
    # 03:00 UTC = 06:00 EAT — runs once a day
    - cron: "0 3 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab too

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest ratings from Chess.com
        run: node scripts/fetch-data.mjs

      - name: Commit updated data.json
        run: |
          git config user.name "ke64-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Daily data refresh"
          git push
